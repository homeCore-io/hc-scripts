name: Cleanup container versions

# Prune old ghcr.io container versions for the homeCore-io org. Runs
# weekly Sunday 09:00 UTC. Each package is pruned in parallel.
#
# Retention (per package):
#   KEEP forever : versions tagged `v*` (release pins) or `latest`
#   KEEP         : the 5 most recent versions outside that protection
#   DELETE       : untagged orphan digests
#   DELETE       : older versions outside the keep-5 window
#
# `min-versions-to-keep: 5` is itself the kill-switch — even if the
# regex misclassifies, the action will refuse to leave a package with
# fewer than 5 versions.
#
# Auth: needs PACKAGES_PAT (classic, scopes: read:packages,
# delete:packages, read:org). The default GITHUB_TOKEN cannot manage
# packages owned by other repos in the org, so a PAT is required.

on:
  schedule:
    - cron: "0 9 * * 0"   # Sunday 09:00 UTC = 5 AM EDT / 4 AM EST
  workflow_dispatch: {}

permissions:
  packages: write

concurrency:
  group: cleanup-containers
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - hc-core
          - hc-hue
          - hc-yolink
          - hc-lutron
          - hc-caseta
          - hc-sonos
          - hc-ecowitt
          - hc-zwave
          - hc-isy
          - hc-wled
          - hc-thermostat
    steps:
      - name: Delete untagged orphans
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          owner: homeCore-io
          package-name: ${{ matrix.package }}
          package-type: container
          delete-only-untagged-versions: 'true'
          token: ${{ secrets.PACKAGES_PAT }}

      - name: Keep 5 most recent, protect v* and latest
        uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          owner: homeCore-io
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 5
          ignore-versions: '^(v\d|latest)'
          token: ${{ secrets.PACKAGES_PAT }}
