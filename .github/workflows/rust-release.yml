# Reusable release workflow for homeCore Rust components.
#
# Builds x86_64-unknown-linux-musl + aarch64-unknown-linux-musl statically
# linked binaries, packages each into a tar.gz with config example +
# README + any extra files, sha-256 sidecars, and uploads as Actions
# artifacts. On a `v*` tag push, additionally creates a GitHub Release.
#
# `workflow_dispatch` triggers a build only — no Release is created.
# This is what lets you validate the whole pipeline before tagging.
#
# Caller example:
#   # core/.github/workflows/release.yml
#   name: Release
#   on:
#     push:
#       tags: ['v*']
#     workflow_dispatch:
#   jobs:
#     release:
#       uses: homeCore-io/hc-scripts/.github/workflows/rust-release.yml@main
#       with:
#         binary_name: homecore
#         config_example: config/homecore.toml.example
#         extra_files: |
#           config/profiles
#           rules/examples
#           scripts/service-templates/homecore.service

name: rust-release

# Opt JavaScript actions into Node.js 24 (default-on after 2026-06-02).
# Removes the deprecation banner from current runs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# TEMPORARY (v0.1.0 release window): force every tag-push build to skip
# aarch64 — multi-arch will be a deliberate later run. Search for
# `# FORCE_FAST` markers below; revert by changing each `true` back to
# `inputs.fast` (and `false` back to `!inputs.fast` at the QEMU gate).

on:
  workflow_call:
    inputs:
      binary_name:
        description: 'Cargo binary target to build (also the archive prefix).'
        required: true
        type: string
      config_example:
        description: 'Path to config example file to include under config/ in the archive. Empty to skip.'
        required: false
        default: ''
        type: string
      extra_files:
        description: 'Newline-separated list of additional paths (files or directories) to include at the archive root.'
        required: false
        default: ''
        type: string
      rust_version:
        description: 'Rust toolchain version.'
        required: false
        default: "stable"
        type: string
      # ─── Docker image publishing (opt-in) ────────────────────────────────
      publish_docker_image:
        description: 'Publish a multi-arch image to ghcr.io after build. Caller release.yml must grant packages: write.'
        required: false
        default: false
        type: boolean
      image_name:
        description: 'ghcr.io image name (defaults to binary_name). Used when binary and image want different names, e.g. binary "homecore" -> image "hc-core".'
        required: false
        default: ''
        type: string
      dockerfile_name:
        description: 'Dockerfile to use from homeCore-io/docker (Dockerfile.plugin or Dockerfile.core).'
        required: false
        default: 'Dockerfile.plugin'
        type: string
      docker_repo_ref:
        description: 'Branch/tag of homeCore-io/docker to fetch the Dockerfile + entrypoints from.'
        required: false
        default: 'main'
        type: string
      bundle_webui:
        description: 'Clone webui_repo + run `trunk build --release` and bundle dist/ as ./ui/ in the docker context. hc-core only.'
        required: false
        default: false
        type: boolean
      webui_repo:
        description: 'Repo to clone when bundle_webui=true (owner/name).'
        required: false
        default: 'homeCore-io/hc-web-leptos'
        type: string
      webui_ref:
        description: 'Branch/tag of webui_repo to clone.'
        required: false
        default: 'main'
        type: string
      fast:
        description: >-
          Skip the aarch64 build (matrix + docker-publish platforms) to halve
          runtime. Defaults to false so tag pushes always get full multi-arch.
          Pass true on workflow_dispatch for fast pre-release iteration —
          published images will be amd64-only until the next non-fast run.
        required: false
        default: false
        type: boolean
      # ─── Appliance assembly (opt-in, tag-push only) ──────────────────────
      assemble_appliance:
        description: >-
          Assemble an appliance archive (homecore + every plugin) per platform.
          Only fires on tag push. Plugin tarballs are downloaded from each
          plugin repo's matching GitHub Release page — every plugin in the
          list must have a release with the same tag for assembly to succeed.
        required: false
        default: false
        type: boolean
      appliance_plugins:
        description: >-
          Newline-separated list of plugin repo names (under homeCore-io)
          to include in the appliance, e.g. `hc-hue\nhc-yolink\n...`.
          Required when assemble_appliance=true.
        required: false
        default: ''
        type: string

jobs:
  # ---------------------------------------------------------------------------
  # WebUI build — runs once when bundle_webui=true. Produces a single
  # webui-dist artifact consumed by the build matrix, appliance job, and
  # docker-publish. Trunk-built WASM is platform-independent so one
  # build serves every arch.
  # ---------------------------------------------------------------------------
  webui-build:
    name: WebUI build
    runs-on: ubuntu-latest
    if: inputs.bundle_webui == true
    steps:
      - name: Clone webui repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.webui_repo }}
          ref: ${{ inputs.webui_ref }}
          path: webui

      - name: Install Rust + wasm32
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk (prebuilt)
        run: |
          set -eux
          TRUNK_VERSION=v0.21.7
          curl -fsSL \
              "https://github.com/trunk-rs/trunk/releases/download/${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
              | sudo tar -xzf - -C /usr/local/bin trunk
          trunk --version

      - name: Build (release)
        working-directory: webui
        run: trunk build --release

      - name: Upload webui-dist
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Build matrix — runs on every workflow_dispatch and tag push.
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.platform }}
    needs: webui-build
    # webui-build is skipped when bundle_webui=false (plugin builds);
    # `always() && (success || skipped)` keeps the build job alive in
    # both cases.
    if: |
      always() &&
      (needs.webui-build.result == 'success' || needs.webui-build.result == 'skipped')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Conditional matrix — fast=true drops the aarch64 entry. Multiline
      # YAML expression so the JSON literals stay readable.
      # FORCE_FAST: `true &&` forces single-arch; revert to `inputs.fast`.
      matrix:
        include: >-
          ${{
            true
            && fromJson('[{"target":"x86_64-unknown-linux-musl","platform":"linux-x86_64","arch":"amd64"}]')
            || fromJson('[{"target":"x86_64-unknown-linux-musl","platform":"linux-x86_64","arch":"amd64"},{"target":"aarch64-unknown-linux-musl","platform":"linux-aarch64","arch":"arm64"}]')
          }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ matrix.arch }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build (${{ matrix.target }})
        run: |
          set -eux
          # Build inside rust:alpine for the target arch — same toolchain
          # as the appliance image, avoids host musl-gcc setup, and makes
          # x86_64 + aarch64 use the same code path.
          #
          # Map rust_version to the correct Docker tag:
          #   "stable"  → rust:alpine        (Docker has no rust:stable-alpine tag)
          #   "1.94"    → rust:1.94-alpine
          #   "nightly" → rust:nightly-alpine (works because that tag exists)
          if [ "${{ inputs.rust_version }}" = "stable" ]; then
              IMAGE="rust:alpine"
          else
              IMAGE="rust:${{ inputs.rust_version }}-alpine"
          fi
          docker run --rm \
            --platform linux/${{ matrix.arch }} \
            -v "$PWD:/src" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -w /src \
            "$IMAGE" \
            sh -c '
              apk add --no-cache musl-dev openssl-dev openssl-libs-static pkgconfig
              cargo build --release --bin ${{ inputs.binary_name }}
            '

      - name: Fetch hc-scripts (for build-archive.sh)
        uses: actions/checkout@v4
        with:
          repository: homeCore-io/hc-scripts
          ref: main
          path: .hc-scripts

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # workflow_dispatch (any branch) → dev-<sha>; tag push (v*) → keep ref_name.
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
              VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download webui-dist
        if: inputs.bundle_webui == true
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui-dist

      - name: Assemble archive
        id: package
        run: |
          set -eux
          # The cargo build inside Docker writes target/release as root,
          # so the runner user can't mkdir under target/. Pass --bin
          # directly to build-archive.sh pointing at the Docker-built
          # path, sidestepping the ownership issue entirely.
          BIN_PATH="target/release/${{ inputs.binary_name }}"
          [ -f "$BIN_PATH" ] || { echo "::error::binary not found at $BIN_PATH"; exit 1; }

          # core: --kind core   (binary_name == homecore)
          # plugin: --kind plugin --name <binary_name>
          # everything else (e.g. hc-tui) packaged as a generic plugin
          # fragment so the per-archive shape stays uniform.
          if [ "${{ inputs.binary_name }}" = "homecore" ]; then
              KIND_ARGS="--kind core"
          else
              KIND_ARGS="--kind plugin --name ${{ inputs.binary_name }}"
          fi

          UI_DIST_ARG=""
          if [ "${{ inputs.bundle_webui }}" = "true" ] && [ -d webui-dist ]; then
              UI_DIST_ARG="--ui-dist webui-dist"
          fi

          .hc-scripts/build-archive.sh \
              $KIND_ARGS \
              --target "${{ matrix.target }}" \
              --version "${{ steps.ver.outputs.version }}" \
              --source "$PWD" \
              --bin "$BIN_PATH" \
              $UI_DIST_ARG \
              --out dist

          # Capture the produced archive path for the upload step.
          archive=$(ls dist/*.tar.gz | head -1)
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "archive_basename=$(basename "$archive" .tar.gz)" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Appliance — opt-in, tag-push only. Downloads each plugin's matching
  # tarball from its own GitHub Release page and merges into a single
  # homecore-appliance archive per platform.
  # ---------------------------------------------------------------------------
  appliance:
    name: Appliance ${{ matrix.platform }}
    needs: build
    runs-on: ubuntu-latest
    if: >-
      inputs.assemble_appliance == true &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      # FORCE_FAST: `true &&` forces single-arch; revert to `inputs.fast`.
      matrix:
        include: >-
          ${{
            true
            && fromJson('[{"target":"x86_64-unknown-linux-musl","platform":"linux-x86_64"}]')
            || fromJson('[{"target":"x86_64-unknown-linux-musl","platform":"linux-x86_64"},{"target":"aarch64-unknown-linux-musl","platform":"linux-aarch64"}]')
          }}

    steps:
      - name: Checkout caller
        uses: actions/checkout@v4
        with:
          path: caller

      - name: Fetch hc-scripts
        uses: actions/checkout@v4
        with:
          repository: homeCore-io/hc-scripts
          ref: main
          path: hc-scripts

      - name: Download core archive (this build)
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: core-artifacts

      - name: Extract core binary into expected layout
        run: |
          set -eux
          # Extract the core archive so build-archive.sh can find the
          # binary at target/<triple>/release/homecore.
          tar -C "$RUNNER_TEMP" -xf "core-artifacts/homecore-core-${GITHUB_REF_NAME}-${{ matrix.platform }}.tar.gz"
          mkdir -p "caller/target/${{ matrix.target }}/release"
          cp "$RUNNER_TEMP/homecore/bin/homecore" \
             "caller/target/${{ matrix.target }}/release/homecore"

      - name: Download plugin tarballs from GitHub Releases
        env:
          TAG: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.platform }}
          PLUGINS: ${{ inputs.appliance_plugins }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          mkdir -p plugin-fragments
          while IFS= read -r plugin; do
            [ -z "$plugin" ] && continue
            asset="${plugin}-${TAG}-${PLATFORM}.tar.gz"
            echo "==> downloading $asset from homeCore-io/${plugin}@${TAG}"
            gh release download "$TAG" \
                --repo "homeCore-io/${plugin}" \
                --pattern "$asset" \
                --dir plugin-fragments
          done <<EOF
          ${PLUGINS}
          EOF
          ls -la plugin-fragments

      - name: Download webui-dist
        if: inputs.bundle_webui == true
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui-dist

      - name: Assemble appliance archive
        run: |
          set -eux
          UI_DIST_ARG=""
          if [ "${{ inputs.bundle_webui }}" = "true" ] && [ -d webui-dist ]; then
              UI_DIST_ARG="--ui-dist $PWD/webui-dist"
          fi

          hc-scripts/build-archive.sh \
              --kind appliance \
              --target "${{ matrix.target }}" \
              --version "${{ github.ref_name }}" \
              --source "$PWD/caller" \
              --plugin-fragments-dir "$PWD/plugin-fragments" \
              $UI_DIST_ARG \
              --out dist

      - name: Upload appliance artifact
        uses: actions/upload-artifact@v4
        with:
          name: appliance-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — only on tag push. workflow_dispatch builds artifacts and stops.
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: [build, appliance]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.appliance.result == 'success' || needs.appliance.result == 'skipped') &&
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Docker — opt-in. Builds a multi-arch alpine image from the prebuilt
  # musl binaries and pushes to ghcr.io/<owner>/<image_name>.
  #
  # Triggered on:
  #   - tag push  -> tag is github.ref_name (e.g. v0.1.0)
  #   - dispatch  -> tag is dev-<short_sha>  (lets us validate without tagging)
  # ---------------------------------------------------------------------------
  docker-publish:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    # always() + explicit success check — without this, the transitive
    # skip from webui-build (skipped when bundle_webui=false) propagates
    # through build and marks this job skipped too. Same pattern as the
    # release job below.
    if: >-
      always() &&
      needs.build.result == 'success' &&
      inputs.publish_docker_image == true &&
      (github.event_name == 'workflow_dispatch' ||
       github.event_name == 'repository_dispatch' ||
       (github.event_name == 'push' && (
         startsWith(github.ref, 'refs/tags/v') ||
         github.ref == 'refs/heads/develop'
       )))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve image name + tag(s)
        id: resolve
        run: |
          set -eux
          IMAGE_NAME="${{ inputs.image_name }}"
          [ -z "$IMAGE_NAME" ] && IMAGE_NAME="${{ inputs.binary_name }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER}/${IMAGE_NAME}"
          # Tag pushes (refs/tags/v*) get a single immutable version tag.
          # Everything else — develop branch push, workflow_dispatch,
          # repository_dispatch — gets BOTH the immutable dev-<sha>
          # tag (for reproducibility) and the rolling :dev tag
          # (for "always pull newest dispatched"). main pushes don't
          # reach this job (gated above) since main is just a release-
          # marker FF target.
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              # Strip the leading `v` from the git tag so image tags use the
              # bare version (`0.1.0`), matching the convention in
              # homeCore-io/docker compose files. The git tag itself stays as
              # `v0.1.0` (mirrored as the GitHub Release name).
              TAG="${GITHUB_REF_NAME#v}"
              TAGS="${BASE}:${TAG}"
          else
              TAG="dev-${GITHUB_SHA::7}"
              TAGS=$(printf '%s\n%s' "${BASE}:${TAG}" "${BASE}:dev")
          fi
          {
              echo "image=${BASE}:${TAG}"
              echo "image_name=${IMAGE_NAME}"
              echo "tag=${TAG}"
              echo "tags<<EOTAGS"
              echo "${TAGS}"
              echo "EOTAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          path: caller

      - name: Checkout homeCore-io/docker
        uses: actions/checkout@v4
        with:
          repository: homeCore-io/docker
          ref: ${{ inputs.docker_repo_ref }}
          path: docker-repo

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage build context
        run: |
          set -eux
          mkdir -p build-context

          # Extract per-arch binaries from each platform's tar.gz and
          # rename to <binary>-<arch> for TARGETARCH selection in the
          # Dockerfile. Loop is resilient to either-or — when fast=true
          # only linux-x86_64 was built, so skip platforms whose
          # artifact dir is missing rather than failing on tar.
          for plat in linux-x86_64 linux-aarch64; do
              if [ ! -d "artifacts/${plat}" ]; then
                  echo "::notice::skipping ${plat} (no artifact uploaded — fast build)"
                  continue
              fi
              tmpdir=$(mktemp -d)
              tar -xzf artifacts/${plat}/*.tar.gz -C "$tmpdir"
              BIN=$(find "$tmpdir" -type f -path "*/bin/${{ inputs.binary_name }}")
              case "$plat" in
                  linux-x86_64)  ARCH=amd64 ;;
                  linux-aarch64) ARCH=arm64 ;;
              esac
              cp "$BIN" "build-context/${{ inputs.binary_name }}-${ARCH}"
          done

          # Dockerfile + matching entrypoint from homeCore-io/docker.
          DOCKERFILE="${{ inputs.dockerfile_name }}"
          cp "docker-repo/images/${DOCKERFILE}" build-context/Dockerfile
          case "$DOCKERFILE" in
              Dockerfile.core)
                  cp docker-repo/images/entrypoint-core.sh build-context/
                  ;;
              Dockerfile.plugin)
                  cp docker-repo/images/entrypoint-plugin.sh build-context/
                  ;;
              *)
                  echo "::error::Unknown dockerfile_name: $DOCKERFILE"
                  exit 1
                  ;;
          esac

          # config.toml.example from caller repo.
          if [ -n "${{ inputs.config_example }}" ] && \
             [ -f "caller/${{ inputs.config_example }}" ]; then
              cp "caller/${{ inputs.config_example }}" build-context/config.toml.example
          else
              # Required by the Dockerfile COPY; fail loudly rather than
              # producing an image with no defaults.
              echo "::error::config_example missing or not found: ${{ inputs.config_example }}"
              exit 1
          fi

          # WebUI bundle (already downloaded by "Download release artifacts").
          # Dockerfile.core copies build-context/ui/ into the image.
          if [ "${{ inputs.bundle_webui }}" = "true" ]; then
              [ -d artifacts/webui-dist ] || { echo "::error::webui-dist artifact missing"; exit 1; }
              cp -r artifacts/webui-dist build-context/ui
          fi

          ls -la build-context

      # QEMU is only needed for cross-arch emulation. Skip it entirely
      # when fast=true so the runner doesn't spend ~30s installing
      # binfmt handlers it won't use.
      # FORCE_FAST: `if: false` skips QEMU; revert to `!inputs.fast`.
      - name: Set up QEMU
        if: ${{ false }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./build-context
          file: ./build-context/Dockerfile
          # FORCE_FAST: `true &&` forces amd64-only; revert to `inputs.fast`.
          platforms: ${{ true && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          build-args: |
            BINARY_NAME=${{ inputs.binary_name }}
          tags: ${{ steps.resolve.outputs.tags }}
          push: true

      - name: Image summary
        run: |
          {
            echo "Pushed:"
            echo '```'
            echo "${{ steps.resolve.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
