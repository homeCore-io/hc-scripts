# Reusable release workflow for homeCore Rust components.
#
# Builds x86_64-unknown-linux-musl + aarch64-unknown-linux-musl statically
# linked binaries, packages each into a tar.gz with config example +
# README + any extra files, sha-256 sidecars, and uploads as Actions
# artifacts. On a `v*` tag push, additionally creates a GitHub Release.
#
# `workflow_dispatch` triggers a build only — no Release is created.
# This is what lets you validate the whole pipeline before tagging.
#
# Caller example:
#   # core/.github/workflows/release.yml
#   name: Release
#   on:
#     push:
#       tags: ['v*']
#     workflow_dispatch:
#   jobs:
#     release:
#       uses: homeCore-io/hc-scripts/.github/workflows/rust-release.yml@main
#       with:
#         binary_name: homecore
#         config_example: config/homecore.toml.example
#         extra_files: |
#           config/profiles
#           rules/examples
#           scripts/service-templates/homecore.service

name: rust-release

# Opt JavaScript actions into Node.js 24 (default-on after 2026-06-02).
# Removes the deprecation banner from current runs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      binary_name:
        description: 'Cargo binary target to build (also the archive prefix).'
        required: true
        type: string
      config_example:
        description: 'Path to config example file to include under config/ in the archive. Empty to skip.'
        required: false
        default: ''
        type: string
      extra_files:
        description: 'Newline-separated list of additional paths (files or directories) to include at the archive root.'
        required: false
        default: ''
        type: string
      rust_version:
        description: 'Rust toolchain version.'
        required: false
        default: "stable"
        type: string
      # ─── Docker image publishing (opt-in) ────────────────────────────────
      publish_docker_image:
        description: 'Publish a multi-arch image to ghcr.io after build. Caller release.yml must grant packages: write.'
        required: false
        default: false
        type: boolean
      image_name:
        description: 'ghcr.io image name (defaults to binary_name). Used when binary and image want different names, e.g. binary "homecore" -> image "hc-core".'
        required: false
        default: ''
        type: string
      dockerfile_name:
        description: 'Dockerfile to use from homeCore-io/docker (Dockerfile.plugin or Dockerfile.core).'
        required: false
        default: 'Dockerfile.plugin'
        type: string
      docker_repo_ref:
        description: 'Branch/tag of homeCore-io/docker to fetch the Dockerfile + entrypoints from.'
        required: false
        default: 'main'
        type: string
      bundle_webui:
        description: 'Clone webui_repo + run `trunk build --release` and bundle dist/ as ./ui/ in the docker context. hc-core only.'
        required: false
        default: false
        type: boolean
      webui_repo:
        description: 'Repo to clone when bundle_webui=true (owner/name).'
        required: false
        default: 'homeCore-io/hc-web-leptos'
        type: string
      webui_ref:
        description: 'Branch/tag of webui_repo to clone.'
        required: false
        default: 'main'
        type: string
      fast:
        description: >-
          Skip the aarch64 build (matrix + docker-publish platforms) to halve
          runtime. Defaults to false so tag pushes always get full multi-arch.
          Pass true on workflow_dispatch for fast pre-release iteration —
          published images will be amd64-only until the next non-fast run.
        required: false
        default: false
        type: boolean

jobs:
  # ---------------------------------------------------------------------------
  # Build matrix — runs on every workflow_dispatch and tag push.
  # ---------------------------------------------------------------------------
  build:
    name: ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Conditional matrix — fast=true drops the aarch64 entry. Multiline
      # YAML expression so the JSON literals stay readable.
      matrix:
        include: >-
          ${{
            inputs.fast
            && fromJson('[{"target":"x86_64-unknown-linux-musl","platform":"linux-x86_64","arch":"amd64"}]')
            || fromJson('[{"target":"x86_64-unknown-linux-musl","platform":"linux-x86_64","arch":"amd64"},{"target":"aarch64-unknown-linux-musl","platform":"linux-aarch64","arch":"arm64"}]')
          }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/${{ matrix.arch }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.target }}-

      - name: Build (${{ matrix.target }})
        run: |
          set -eux
          # Build inside rust:alpine for the target arch — same toolchain
          # as the appliance image, avoids host musl-gcc setup, and makes
          # x86_64 + aarch64 use the same code path.
          #
          # Map rust_version to the correct Docker tag:
          #   "stable"  → rust:alpine        (Docker has no rust:stable-alpine tag)
          #   "1.94"    → rust:1.94-alpine
          #   "nightly" → rust:nightly-alpine (works because that tag exists)
          if [ "${{ inputs.rust_version }}" = "stable" ]; then
              IMAGE="rust:alpine"
          else
              IMAGE="rust:${{ inputs.rust_version }}-alpine"
          fi
          docker run --rm \
            --platform linux/${{ matrix.arch }} \
            -v "$PWD:/src" \
            -v "$HOME/.cargo/registry:/usr/local/cargo/registry" \
            -w /src \
            "$IMAGE" \
            sh -c '
              apk add --no-cache musl-dev openssl-dev openssl-libs-static pkgconfig
              cargo build --release --bin ${{ inputs.binary_name }}
            '

      - name: Assemble archive
        id: package
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME}"
          # workflow_dispatch off main has ref_name=main; tag pushes have v*.
          [ "${VERSION}" = "main" ] && VERSION="dev-$(git rev-parse --short HEAD)"

          NAME="${{ inputs.binary_name }}-${VERSION}-${{ matrix.platform }}"
          mkdir -p "${NAME}/bin"

          # release/ contains both x86_64 and aarch64 build outputs since we
          # built into the default target dir inside the container; the
          # binary is the same regardless of arch (single per-build container).
          cp "target/release/${{ inputs.binary_name }}" "${NAME}/bin/"
          chmod +x "${NAME}/bin/${{ inputs.binary_name }}"

          if [ -n "${{ inputs.config_example }}" ] && [ -f "${{ inputs.config_example }}" ]; then
              mkdir -p "${NAME}/config"
              cp "${{ inputs.config_example }}" "${NAME}/config/"
          fi

          if [ -f README.md ]; then
              cp README.md "${NAME}/"
          fi

          # extra_files: one path per line; copy each (file or dir) to archive root
          if [ -n "${{ inputs.extra_files }}" ]; then
              while IFS= read -r entry; do
                  [ -z "$entry" ] && continue
                  if [ -e "$entry" ]; then
                      cp -r "$entry" "${NAME}/"
                  else
                      echo "::warning::extra_files entry not found: $entry"
                  fi
              done <<EOF
          ${{ inputs.extra_files }}
          EOF
          fi

          tar -czf "${NAME}.tar.gz" "${NAME}"
          sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ steps.package.outputs.name }}.tar.gz
            ${{ steps.package.outputs.name }}.tar.gz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — only on tag push. workflow_dispatch builds artifacts and stops.
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Docker — opt-in. Builds a multi-arch alpine image from the prebuilt
  # musl binaries and pushes to ghcr.io/<owner>/<image_name>.
  #
  # Triggered on:
  #   - tag push  -> tag is github.ref_name (e.g. v0.1.0)
  #   - dispatch  -> tag is dev-<short_sha>  (lets us validate without tagging)
  # ---------------------------------------------------------------------------
  docker-publish:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    if: >-
      inputs.publish_docker_image == true &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve image name + tag(s)
        id: resolve
        run: |
          set -eux
          IMAGE_NAME="${{ inputs.image_name }}"
          [ -z "$IMAGE_NAME" ] && IMAGE_NAME="${{ inputs.binary_name }}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE="ghcr.io/${OWNER}/${IMAGE_NAME}"
          if [ "${{ github.event_name }}" = "push" ]; then
              # Tag push (release): single immutable version tag.
              TAG="${GITHUB_REF_NAME}"
              TAGS="${BASE}:${TAG}"
          else
              # workflow_dispatch: emit BOTH the immutable dev-<sha>
              # tag and the rolling :dev tag. Pull :dev for "always
              # latest dispatched build"; pull :dev-<sha> for
              # reproducibility. Tag pushes never touch :dev.
              TAG="dev-${GITHUB_SHA::7}"
              TAGS="${BASE}:${TAG}
${BASE}:dev"
          fi
          {
              echo "image=${BASE}:${TAG}"
              echo "image_name=${IMAGE_NAME}"
              echo "tag=${TAG}"
              echo "tags<<EOTAGS"
              echo "${TAGS}"
              echo "EOTAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout calling repo
        uses: actions/checkout@v4
        with:
          path: caller

      - name: Checkout homeCore-io/docker
        uses: actions/checkout@v4
        with:
          repository: homeCore-io/docker
          ref: ${{ inputs.docker_repo_ref }}
          path: docker-repo

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage build context
        run: |
          set -eux
          mkdir -p build-context

          # Extract per-arch binaries from each platform's tar.gz and
          # rename to <binary>-<arch> for TARGETARCH selection in the
          # Dockerfile. Loop is resilient to either-or — when fast=true
          # only linux-x86_64 was built, so skip platforms whose
          # artifact dir is missing rather than failing on tar.
          for plat in linux-x86_64 linux-aarch64; do
              if [ ! -d "artifacts/${plat}" ]; then
                  echo "::notice::skipping ${plat} (no artifact uploaded — fast build)"
                  continue
              fi
              tmpdir=$(mktemp -d)
              tar -xzf artifacts/${plat}/*.tar.gz -C "$tmpdir"
              BIN=$(find "$tmpdir" -type f -path "*/bin/${{ inputs.binary_name }}")
              case "$plat" in
                  linux-x86_64)  ARCH=amd64 ;;
                  linux-aarch64) ARCH=arm64 ;;
              esac
              cp "$BIN" "build-context/${{ inputs.binary_name }}-${ARCH}"
          done

          # Dockerfile + matching entrypoint from homeCore-io/docker.
          DOCKERFILE="${{ inputs.dockerfile_name }}"
          cp "docker-repo/images/${DOCKERFILE}" build-context/Dockerfile
          case "$DOCKERFILE" in
              Dockerfile.core)
                  cp docker-repo/images/entrypoint-core.sh build-context/
                  ;;
              Dockerfile.plugin)
                  cp docker-repo/images/entrypoint-plugin.sh build-context/
                  ;;
              *)
                  echo "::error::Unknown dockerfile_name: $DOCKERFILE"
                  exit 1
                  ;;
          esac

          # config.toml.example from caller repo.
          if [ -n "${{ inputs.config_example }}" ] && \
             [ -f "caller/${{ inputs.config_example }}" ]; then
              cp "caller/${{ inputs.config_example }}" build-context/config.toml.example
          else
              # Required by the Dockerfile COPY; fail loudly rather than
              # producing an image with no defaults.
              echo "::error::config_example missing or not found: ${{ inputs.config_example }}"
              exit 1
          fi

          ls -la build-context

      - name: Install Rust + wasm32 (for trunk build)
        if: inputs.bundle_webui == true
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk (prebuilt)
        if: inputs.bundle_webui == true
        run: |
          set -eux
          TRUNK_VERSION=v0.21.7
          curl -fsSL \
              "https://github.com/trunk-rs/trunk/releases/download/${TRUNK_VERSION}/trunk-x86_64-unknown-linux-gnu.tar.gz" \
              | sudo tar -xzf - -C /usr/local/bin trunk
          trunk --version

      - name: Build WASM UI bundle
        if: inputs.bundle_webui == true
        run: |
          set -eux
          git clone --depth 1 \
              --branch "${{ inputs.webui_ref }}" \
              "https://github.com/${{ inputs.webui_repo }}.git" \
              webui
          (cd webui && trunk build --release)
          cp -r webui/dist build-context/ui

      # QEMU is only needed for cross-arch emulation. Skip it entirely
      # when fast=true so the runner doesn't spend ~30s installing
      # binfmt handlers it won't use.
      - name: Set up QEMU
        if: ${{ !inputs.fast }}
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./build-context
          file: ./build-context/Dockerfile
          platforms: ${{ inputs.fast && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          build-args: |
            BINARY_NAME=${{ inputs.binary_name }}
          tags: ${{ steps.resolve.outputs.tags }}
          push: true

      - name: Image summary
        run: |
          {
            echo "Pushed:"
            echo '```'
            echo "${{ steps.resolve.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
