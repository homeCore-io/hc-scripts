# Reusable CI workflow for homeCore Rust components.
#
# Runs fmt + clippy + test on the calling repo. Each component (core,
# plugin, hc-tui) wires its own .github/workflows/ci.yml that calls into
# this one — fix the workflow here, every component picks it up.
#
# Caller example:
#   # core/.github/workflows/ci.yml
#   name: CI
#   on:
#     push:
#       branches: [main, develop]
#     pull_request:
#       branches: [main]
#   jobs:
#     ci:
#       uses: homeCore-io/hc-scripts/.github/workflows/rust-ci.yml@main
#       with:
#         rust_version: "1.88"

name: rust-ci

# Opt JavaScript actions into Node.js 24 (default-on after 2026-06-02).
# Removes the deprecation banner from current runs.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_call:
    inputs:
      rust_version:
        description: 'Rust toolchain to use (matches rustup channel/version).
          Pinned default — bump deliberately rather than tracking "stable".
          Aligned with hc-scripts/rust-release.yml + Dockerfile pins as of
          BPF-2.2 (2026-05-04).'
        required: false
        default: "1.95"
        type: string
      run_clippy:
        description: 'Run clippy with -D warnings.'
        required: false
        default: true
        type: boolean
      run_tests:
        description: 'Run cargo test.'
        required: false
        default: true
        type: boolean

jobs:
  ci:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    # issues:write so the failure/recovery notify steps below can open
    # and close a tracking issue when develop goes red.
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust ${{ inputs.rust_version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust_version }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        if: ${{ inputs.run_clippy }}
        # Three lints intentionally allowed at CI scope — see release_0_1_0
        # plan. They are stylistic rather than bug-catching for our codebase
        # and the fixes don't materially improve readability:
        #   too_many_arguments  — aggregator constructors (e.g. AppState::new)
        #   type_complexity     — concrete types like Arc<DashMap<…>> we want
        #                         visible at the field rather than hidden behind
        #                         an alias
        #   result_large_err    — Result<T, axum::Response> from API handlers;
        #                         boxing changes the calling convention
        # Re-enable each as we get to it; do NOT add new entries here without
        # discussing the trade-off.
        run: |
          cargo clippy --all-targets --all-features -- \
            -D warnings \
            -A clippy::too_many_arguments \
            -A clippy::type_complexity \
            -A clippy::result_large_err

      - name: cargo test
        if: ${{ inputs.run_tests }}
        run: cargo test --all-features

      # ── Develop CI is otherwise unwatched (no branch protection, no
      # required-checks gate), so red status can rot for days. Open a
      # single tracking issue per repo when develop fails and close it
      # when develop recovers. Pull requests and main pushes skip this —
      # PR red is already visible to the author, and main red would
      # block merges anyway.
      - name: Open tracking issue on develop failure
        if: failure() && github.ref == 'refs/heads/develop' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          TITLE="CI failing on develop"
          BODY="Develop CI failed: ${RUN_URL} (sha ${SHA})

          This issue auto-closes when develop CI passes again."
          # Match by title — avoids requiring a ci-failure label to exist.
          EXISTING=$(gh issue list --repo "$REPO" --state open \
              --search "\"${TITLE}\" in:title" \
              --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
              gh issue comment "$EXISTING" --repo "$REPO" \
                  --body "Run failed again: ${RUN_URL} (sha ${SHA})"
          else
              gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY"
          fi

      - name: Close tracking issue on develop recovery
        if: success() && github.ref == 'refs/heads/develop' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -e
          TITLE="CI failing on develop"
          EXISTING=$(gh issue list --repo "$REPO" --state open \
              --search "\"${TITLE}\" in:title" \
              --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" --repo "$REPO" \
                  --comment "Develop CI green again (sha ${SHA})."
          fi
